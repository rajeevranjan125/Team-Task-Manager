# Database Configuration
# Locally uses your MySQL. On Railway, it uses the injected DATABASE_URL.
spring.datasource.url=${PROD_DB_URL}
spring.datasource.username=${PROD_DB_USER}
spring.datasource.password=${PROD_DB_PASS}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (disabled since we are using MySQL now)
spring.h2.console.enabled=false
