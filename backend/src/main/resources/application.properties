# Database Configuration
# Locally uses your MySQL. On Railway, it uses the injected DATABASE_URL.
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/team_task_manager?createDatabaseIfNotExist=true}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:Rajeev9934@#}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (disabled since we are using MySQL now)
spring.h2.console.enabled=false
